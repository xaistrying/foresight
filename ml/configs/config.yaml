aws:
  region: ap-southeast-1

athena:
  database: txn_db
  training_table: training_data
  s3_output: s3://txns-dataset-bucket-560205085106-ap-southeast-1-an/athena-results/

s3:
  bucket: txns-dataset-bucket-560205085106-ap-southeast-1-an
  model_prefix: models/

gate:
  # Placeholder, unvalidated — no historical run variance to derive this from yet.
  # Revisit once several months of real challenger/champion MAPE comparisons exist.
  promotion_margin_pct: 0.05

features:
  group_cols: [storeid, hour, softype]
  outlier_percentile: 0.99
  peak_hours: [9, 13]
  weekend_days: [6, 7] # Saturday (6) and Sunday (7)

model:
  n_estimators: 1000
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.8
  early_stopping_rounds: 30
  random_state: 42
  n_jobs: -1
